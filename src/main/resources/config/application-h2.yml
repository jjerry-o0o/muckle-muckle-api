spring:
  config:
    activate:
      on-profile: h2


  # h2 DB Config
  datasource:
    url: jdbc:h2:mem:testdb
#    url: jdbc:h2:tcp://localhost/~/test
    driver-class-name: org.h2.Driver
    username: sa
    password:
  # h2 console
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA Setting
  jpa:
    show-sql: true # SQL 로그 출력 여부 true/false
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: none #none: DDL 자동 생성 안함, create: 매번 테이블을 새로 생성, update: 변경된 부분만 반영
    defer-datasource-initialization: false #fixme

  sql:
    init:
      mode: embedded #always
      schema-locations: classpath:sql/schema.sql
      data-locations: classpath:sql/data.sql

mybatis:
  mapper-locations: classpath:/mapper/*.xml

jasypt:
  encryptor:
    password: MillJasyptKey
